server.port=8080

# Database - Neon PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/foodwise}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:foodwise-secret-key-change-in-prod-min-256-bits}
jwt.expiration=86400000

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}

# Frontend URL (for CORS)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.websocket.path=/ws

logging.level.com.foodwise=INFO
