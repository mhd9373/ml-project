version: '3.9'

services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: foodwise_db
    environment:
      POSTGRES_DB: foodwise
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Python ML Service ─────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: foodwise_ml
    environment:
      PORT: 5001
      MODELS_DIR: /app/models
    volumes:
      - ml_models:/app/models
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: >
      sh -c "python train_model.py && python app.py"

  # ─── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodwise_backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/foodwise
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      ML_SERVICE_URL: http://ml-service:5001
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-256-bit-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ─── React Frontend (local dev) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api/v1
        VITE_WS_URL: ws://localhost:8080/ws
    container_name: foodwise_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ml_models:
